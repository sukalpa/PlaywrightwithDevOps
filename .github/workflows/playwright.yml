name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ updated
      with:
        python-version: '3.11'   # slightly better support

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps   # ✅ important for Linux

    - name: Run tests
      run: pytest

    - name: Upload test report (optional but useful)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          reports/
          playwright-report/
